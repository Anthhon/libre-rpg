<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>{% block title %}Libre-RPG{% endblock %}</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        {% load static %}
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <nav class="col-md-3 col-lg-2 d-md-block bg-secondary sidebar collapse min-vh-100">
                    <div class="position-sticky p-3">
                        <h2 class="text-white mb-4">Libre-RPG</h2>
                        <ul class="nav flex-column">
                            <li class="nav-item"><a class="nav-link text-light" href="{% url 'dashboard' %}">Visão Geral</a></li>
                            {% comment %}
                            <li class="nav-item"><a class="nav-link text-light" href="{% url 'users' %}">Usuários</a></li>
                            <li class="nav-item"><a class="nav-link text-light" href="{% url 'character_sheets' %}">Fichas</a></li>
                            <li class="nav-item"><a class="nav-link text-light" href="{% url 'map_viewer' %}">Mapa</a></li>
                            <li class="nav-item"><a class="nav-link text-light" href="{% url 'chat' %}">Chat</a></li>
                            <li class="nav-item"><a class="nav-link text-light" href="{% url 'dice_roller' %}">Rolagens</a></li>
                            <li class="nav-item"><a class="nav-link text-light" href="{% url 'soundboard' %}">SFX/Player</a></li>
                            <li class="nav-item"><a class="nav-link text-light" href="{% url 'table_library' %}">Biblioteca da Mesa</a></li>
                            {% endcomment %}
                        </ul>
                    </div>
                </nav>

                <!-- Main content -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                    {% block content %}
                    {% endblock %}
                </main>

            </div>
        </div>

        <!-- Bootstrap default scripts -->
        <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    </body>
</html>
